{{ define "main" }}
<section class="hero">
    <div class="hero-content">
        <h1>{{ i18n "hero_greeting" }} {{ .Site.Params.author | default "m03315" }}</h1>
        <p>{{ .Site.Params.subtitle | default "数字游民 • 科技探索者 • 生活记录者" }}</p>
        <p>{{ .Site.Params.description | default "分享科技前沿见解，记录数字游民生活，提供实用攻略指南" }}</p>
        <div class="cta-buttons">
            <a href="{{ .Site.BaseURL }}posts/" class="btn btn-primary">{{ i18n "follow_social" }}</a>
            <a href="{{ .Site.BaseURL }}about/" class="btn btn-secondary">{{ i18n "learn_more" }}</a>
        </div>
        <div class="social-icons">
            <a href="https://github.com/YOUR_USERNAME" target="_blank" aria-label="GitHub">
                <i class="fab fa-github"></i>
            </a>
            <a href="https://linkedin.com/in/YOUR_USERNAME" target="_blank" aria-label="LinkedIn">
                <i class="fab fa-linkedin"></i>
            </a>
            <a href="mailto:your@email.com" aria-label="Email">
                <i class="fas fa-envelope"></i>
            </a>
        </div>

    </div>
</section>

{{ end }}
